<!DOCTYPE html>
<html>
<head>
    <title>Stream Test</title>
</head>
<body>
    <h1>Stream Debugging</h1>
    <div id="output"></div>
    <script>
        // Check if DOM is ready
        const output = document.getElementById('output');
        
        function log(msg) {
            output.innerHTML += `<p>${msg}</p>`;
            console.log(msg);
        }
        
        log('Test page loaded');
        
        // Check if stream.js loads
        log('About to load stream.js');
    </script>
    
    <script src="stream.js"></script>
    
    <script>
        log('stream.js loaded');
        log('StreamManager class available: ' + (typeof StreamManager !== 'undefined'));
    </script>
</body>
</html>
